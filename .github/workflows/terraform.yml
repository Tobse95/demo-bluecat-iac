name: Terraform

on:
  pull_request:
    paths: ["subnets/**"]
  push:
    branches: [main]
    paths: ["subnets/**"]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Plan / Apply
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Init
        run: terraform init

      - name: Validate
        run: terraform validate

      - name: Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Post plan comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### BlueCat Terraform Plan

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            *Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body: output
            });

      - name: Fail on plan error
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'failure'
        run: exit 1

      - name: Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false

      - name: Signal deployment to self-service
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.SELF_SERVICE_GITHUB_TOKEN }}
        run: |
          for yaml in subnets/*.yaml; do
            [ -f "$yaml" ] || continue
            name=$(grep '^subnet_name:' "$yaml" | awk '{print $2}' | tr -d '"')
            env=$(grep '^environment:' "$yaml" | awk '{print $2}' | tr -d '"')
            [ -z "$name" ] || [ -z "$env" ] && continue
            gh api repos/Tobse95/network-self-service/dispatches \
              --method POST \
              -f event_type=subnet-active \
              -f "client_payload[subnet_name]=$name" \
              -f "client_payload[environment]=$env" \
              -f "client_payload[platform]=bluecat"
          done
